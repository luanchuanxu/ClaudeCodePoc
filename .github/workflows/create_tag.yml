name: Create Git Tag (and Deploy to stg)

on:
  workflow_dispatch:
    inputs:
      tag_name:
        required: true
        type: string

jobs:
  create-git-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          git tag ${{ inputs.tag_name }}
          git push origin ${{ inputs.tag_name }}
  deploy:
    uses: ./.github/workflows/validate_deploy_command.yml
    with:
      alias: stg
      testLevel: RunLocalTests
      dryRun: false
    secrets:
      JWT_KEY: ${{ secrets.JWT_KEY }}
