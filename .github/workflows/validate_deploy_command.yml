name: Sub-workflow to validate/deploy

on:
  workflow_call:
    inputs:
      alias:
        required: true
        type: string
      testLevel: ## Expected NoTestRun | RunSpecifiedTests | RunLocalTests
        required: true
        type: string
      testClasses:
        type: string
      dryRun: # Validate のみで Deploy しない場合は true
        default: true
        type: boolean
      manifest:
        type: string
        default: 'cicd-package.xml'
    secrets:
      SFDX_AUTH_URL:
        required: true

env:
  SF_USE_GENERIC_UNIX_KEYCHAIN: true
  SF_USE_PROGRESS_BAR: false

jobs:
  main:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: npm install @salesforce/cli -g
      - name: Authenticate (sfdx auth url)
        run: |
          echo "$SFDX_AUTH_URL" > ./authurl.txt
          sf org login sfdx-url --sfdx-url-file ./authurl.txt --alias ${{ inputs.alias }} --set-default
          rm -f ./authurl.txt
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
      - name: Validate/Deploy
        run: |
          sf project deploy start --manifest manifest/${{ inputs.manifest }} $TEST_OPTION --target-org ${{ inputs.alias }} --wait 60 $DRY_RUN_OPTION > validateResult.txt
        env:
          DRY_RUN_OPTION: ${{ inputs.dryRun == true && '--dry-run' || '' }}
          TEST_OPTION: ${{ inputs.testLevel == 'RunSpecifiedTests' && format('--test-level {0} --tests {1}', inputs.testLevel, inputs.testClasses) || format('--test-level {0}', inputs.testLevel) }}
      - name: Show Validate/Deploy Result
        run: cat validateResult.txt
        if: success() || failure()
